<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Description Red Flag Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181b;
      --surface2: #222226;
      --border: #2e2e34;
      --text: #f4f4f5;
      --muted: #71717a;
      --accent: #6366f1;
      --accent-soft: #1e1e3a;
      --red: #f87171;
      --red-soft: #2a1515;
      --green: #4ade80;
      --green-soft: #0f2a1a;
      --yellow: #fbbf24;
      --yellow-soft: #2a2010;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header { margin-bottom: 40px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid #3b3b8a;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 28px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 16px;
      width: 100%;
      justify-content: center;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading {
      display: none;
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results { display: none; }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }

    .score-card .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .score-number {
      font-size: 40px;
      font-weight: 600;
      line-height: 1;
    }

    .score-denom { font-size: 18px; color: var(--muted); font-weight: 400; }

    .rec-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 99px;
    }

    .rec-apply { background: var(--green-soft); color: var(--green); }
    .rec-caution { background: var(--yellow-soft); color: var(--yellow); }
    .rec-avoid { background: var(--red-soft); color: var(--red); }

    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
    }

    .info-card .card-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .info-card p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    .flags-section { margin-bottom: 16px; }

    .flags-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .flag-item {
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .flag-item.red { background: var(--red-soft); border-left: 3px solid var(--red); }
    .flag-item.green { background: var(--green-soft); border-left: 3px solid var(--green); }

    .flag-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .flag-item.red .flag-title { color: var(--red); }
    .flag-item.green .flag-title { color: var(--green); }

    .flag-detail { font-size: 13px; color: var(--muted); line-height: 1.5; }

    .questions-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .question-item {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .q-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      min-width: 20px;
      padding-top: 2px;
      font-family: 'DM Mono', monospace;
    }

    .q-text { font-size: 14px; color: var(--text); line-height: 1.6; }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 24px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      width: 100%;
      transition: border-color 0.2s, color 0.2s;
      margin-bottom: 40px;
    }

    .reset-btn:hover { border-color: var(--accent); color: var(--text); }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
      padding-bottom: 20px;
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
      AI-Powered
    </div>
    <h1>Job Description<br/><span>Red Flag Detector</span></h1>
    <p class="subtitle">Paste any job posting and get an instant honest analysis — red flags, green flags, salary assessment, and the questions you should be asking.</p>
  </header>

  <div class="input-card" id="input-section">
    <label>Job Description</label>
    <textarea id="jd-input" placeholder="Paste the full job description here..."></textarea>
    <button class="btn" id="analyze-btn" onclick="analyze()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Analyze Job Description
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loading-text">Analyzing job description...</span>
  </div>

  <div class="results" id="results"></div>

</div>

<script>
const messages = [
  "Reading between the lines...",
  "Checking salary transparency...",
  "Sniffing out red flags...",
  "Evaluating the fine print...",
  "Almost done..."
];

let msgInterval;

function startLoading() {
  let i = 0;
  document.getElementById('loading-text').textContent = messages[0];
  msgInterval = setInterval(() => {
    i = (i + 1) % messages.length;
    document.getElementById('loading-text').textContent = messages[i];
  }, 2000);
}

function stopLoading() { clearInterval(msgInterval); }

async function analyze() {
  const jd = document.getElementById('jd-input').value.trim();
  if (!jd) { alert('Please paste a job description first.'); return; }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('input-section').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('analyze-btn').disabled = true;
  startLoading();

  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobDescription: jd })
    });

    if (!resp.ok) throw new Error(`Server error ${resp.status}`);
    const result = await resp.json();
    stopLoading();
    document.getElementById('loading').style.display = 'none';
    renderResults(result);
  } catch(e) {
    stopLoading();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('input-section').style.display = 'block';
    document.getElementById('analyze-btn').disabled = false;
    alert('Something went wrong. Please try again.');
  }
}

function scoreColor(s) {
  if (s >= 7) return 'var(--green)';
  if (s >= 4) return 'var(--yellow)';
  return 'var(--red)';
}

function renderResults(r) {
  const rec = r.recommendation || 'caution';
  const recLabels = { apply: 'Apply', caution: 'Proceed with caution', avoid: 'Avoid' };

  const redHTML = (r.red_flags || []).map(f => `
    <div class="flag-item red">
      <div class="flag-title">${f.flag}</div>
      <div class="flag-detail">${f.detail}</div>
    </div>`).join('');

  const greenHTML = (r.green_flags || []).map(f => `
    <div class="flag-item green">
      <div class="flag-title">${f.flag}</div>
      <div class="flag-detail">${f.detail}</div>
    </div>`).join('');

  const questionsHTML = (r.questions_to_ask || []).map((q, i) => `
    <div class="question-item">
      <span class="q-num">0${i+1}</span>
      <span class="q-text">${q}</span>
    </div>`).join('');

  const rb = {
    apply:   { cls: 'rec-apply',   label: 'Apply' },
    caution: { cls: 'rec-caution', label: 'Proceed with caution' },
    avoid:   { cls: 'rec-avoid',   label: 'Avoid' }
  }[rec] || { cls: 'rec-caution', label: 'Proceed with caution' };

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').innerHTML = `
    <div class="score-grid">
      <div class="score-card">
        <div class="label">Opportunity Score</div>
        <div class="score-number" style="color:${scoreColor(r.overall_score)}">${r.overall_score}<span class="score-denom">/10</span></div>
      </div>
      <div class="score-card">
        <div class="label">Recommendation</div>
        <div style="margin-top:8px;"><span class="rec-badge ${rb.cls}">${rb.label}</span></div>
      </div>
    </div>
    <div class="info-card">
      <div class="card-label">Verdict</div>
      <p>${r.verdict}</p>
    </div>
    <div class="info-card">
      <div class="card-label">What This Role Actually Is</div>
      <p>${r.role_reality}</p>
    </div>
    <div class="info-card">
      <div class="card-label">Salary Assessment</div>
      <p>${r.salary_assessment}</p>
    </div>
    ${redHTML ? `<div class="flags-section"><div class="flags-title">Red Flags (${(r.red_flags||[]).length})</div>${redHTML}</div>` : ''}
    ${greenHTML ? `<div class="flags-section"><div class="flags-title">Green Flags (${(r.green_flags||[]).length})</div>${greenHTML}</div>` : ''}
    ${questionsHTML ? `
    <div class="questions-card">
      <div class="card-label" style="margin-bottom:14px;">Questions to Ask in the Interview</div>
      ${questionsHTML}
    </div>` : ''}
    <button class="reset-btn" onclick="reset()">Analyze another job description</button>
    <footer>Built by <a href="https://samuel25-hub.github.io/" target="_blank">Samuel Owusu</a> &middot; Powered by Claude AI</footer>
  `;
}

function reset() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('jd-input').value = '';
  document.getElementById('input-section').style.display = 'block';
  document.getElementById('analyze-btn').disabled = false;
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
